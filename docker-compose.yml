version: '3.8'

services:
  app:
    build: .
    ports:
      - "5001:5001"
    environment:
      - PORT=5001
      # Note: MONGODB_URI and Cloudinary variables will be passed from your .env file
    env_file:
      - .env
    depends_on:
      - mongodb

  mongodb:
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

volumes:
  mongodb_data:
